<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" /> <!-- Google blue -->
      <stop offset="100%" stop-color="#7B68EE" /> <!-- Medium slate blue / purple -->
    </linearGradient>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4" /> <!-- Google blue -->
      <stop offset="100%" stop-color="#7B68EE" /> <!-- Medium slate blue / purple -->
    </linearGradient>
  </defs>

  <!-- Cloud shape with gradient -->
  <path d="M225,130 C225,90 195,60 155,60 C115,60 85,90 85,130 C85,130 85,130 85,130 C65,130 50,145 50,165 C50,185 65,200 85,200 L225,200 C245,200 260,185 260,165 C260,145 245,130 225,130 Z" 
        fill="url(#cloudGradient)" />

  <!-- Grid lines representing infrastructure on left side -->
  <g opacity="0.8">
    <!-- Vertical lines -->
    <line x1="85" y1="100" x2="85" y2="200" stroke="url(#gridGradient)" stroke-width="1.5" />
    <line x1="115" y1="80" x2="115" y2="200" stroke="url(#gridGradient)" stroke-width="1.5" />
    <line x1="145" y1="70" x2="145" y2="200" stroke="url(#gridGradient)" stroke-width="1.5" />
    
    <!-- Horizontal lines -->
    <line x1="50" y1="130" x2="145" y2="130" stroke="url(#gridGradient)" stroke-width="1.5" />
    <line x1="65" y1="165" x2="145" y2="165" stroke="url(#gridGradient)" stroke-width="1.5" />
    <line x1="85" y1="100" x2="145" y2="100" stroke="url(#gridGradient)" stroke-width="1.5" />
  </g>

  <!-- Canvas/drawing board transformation on right side -->
  <g opacity="0.9">
    <!-- Canvas frame -->
    <rect x="145" y="70" width="100" height="130" rx="4" stroke="white" stroke-width="1.5" fill="none" />
    
    <!-- Canvas drawing elements -->
    <circle cx="175" cy="100" r="15" fill="white" opacity="0.5" />
    <rect x="195" y="130" width="30" height="30" fill="white" opacity="0.3" />
    <path d="M160,150 Q180,120 200,150" stroke="white" stroke-width="2" fill="none" />
  </g>

  <!-- Text "Canvas Cloud AI" -->
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="url(#textGradient)" font-weight="600">Canvas Cloud AI</text>
</svg>